apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-manager-client
  labels:
    app: user-manager-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-manager-client
  template:
    metadata:
      labels:
        app: user-manager-client
    spec:
      containers:
        - name: user-manager-client
          image: pooja17122/user-manager-client:4372065e
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-manager-server
  labels:
    app: user-manager-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-manager-server
  template:
    metadata:
      labels:
        app: user-manager-server
    spec:
      containers:
        - name: user-manager-server
          image: pooja17122/user-manager-server:4372065e
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

 